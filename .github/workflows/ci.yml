name: "CI"

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: "build-${{ github.head_ref || github.run_id }}-${{ github.event_name }}"
  cancel-in-progress: true

# UPDATE VERSIONS HERE AND IN MAIN .cs FILE. DON'T FORGET RELEASE NOTES!
env:
  MOD_VERSION: '1.0.0'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
        - name: Setup dotnet
          uses: actions/setup-dotnet@v5
          with:
              dotnet-version: '10.0.x'

        - name: Checkout
          uses: actions/checkout@v6

        - name: Build
          run: dotnet build -c Release

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: contains(github.event.head_commit.message, '[Deploy]') && github.event_name == 'push'
    permissions:
      id-token: write
      attestations: write
      artifact-metadata: write
      contents: write
    steps:
        - name: Setup dotnet
          uses: actions/setup-dotnet@v5
          with:
              dotnet-version: '10.0.x'

        - name: Checkout
          uses: actions/checkout@v6

        - name: Publish
          run: dotnet publish -o publish /nowarn:NETSDK1194

        - name: Attest
          uses: actions/attest@v4
          with:
            subject-path: 'publish/PromptUserStatus.dll'

        - name: Create GitHub Release
          uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
          with:
            token: ${{ secrets.GITHUB_TOKEN }}
            tag_name: v${{ env.MOD_VERSION }}
            name: PromptUserStatus v${{ env.MOD_VERSION }}
            files: |
              ./publish/PromptUserStatus.dll
            body_path: RELEASE_NOTES.md
            target_commitish: ${{ github.event.head_commit.id }}
            make_latest: true
